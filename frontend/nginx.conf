# Serves the built SPA and reverse-proxies API / WebSocket / Django routes to
# the backend container. The frontend uses same-origin relative paths in prod
# (see src/config.ts), so everything flows through this one origin.

upstream meroos_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (matches backend MAX_UPLOAD_SIZE default of 100MB)
    client_max_body_size 100M;

    # ---- SPA ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- REST API ----
    location /api/ {
        proxy_pass http://meroos_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- WebSocket (Kahoot live games) ----
    location /ws/ {
        proxy_pass http://meroos_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ---- Django admin + API docs ----
    location /admin/ {
        proxy_pass http://meroos_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Backend static (Django admin / DRF), served by WhiteNoise ----
    location /static/ {
        proxy_pass http://meroos_backend;
    }

    # ---- User-uploaded media, served directly from the shared volume ----
    # (Django does not serve media when DEBUG=False, so nginx serves the files.)
    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 7d;
    }
}
