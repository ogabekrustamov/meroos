  /api/news/posts/:
    get:
      operationId: api_news_posts_list
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: is_featured
        schema:
          type: boolean
      - in: query
        name: is_pinned
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: post_type
        schema:
          type: string
          enum:
          - announcement
          - blog
          - news
          - update
        description: |-
          * `news` - News
          * `announcement` - Announcement
          * `blog` - Blog Post
          * `update` - Update
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
