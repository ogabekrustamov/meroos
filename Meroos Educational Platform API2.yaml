components:
  schemas:
    AccessLevelEnum:
      enum:
      - public
      - students
      - registered
      - premium
      type: string
      description: |-
        * `public` - Public - All users
        * `students` - Students only
        * `registered` - Registered users only
        * `premium` - Premium/Paid
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        icon:
          type: string
          description: Icon class or emoji
          maxLength: 50
        color:
          type: string
          description: Hex color code
          maxLength: 7
        parent:
          type: integer
          nullable: true
        parent_name:
          type: string
          readOnly: true
        order:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_active:
          type: boolean
        total_resources:
          type: string
          readOnly: true
        subcategories:
          type: string
          readOnly: true
      required:
      - id
      - name
      - parent_name
      - slug
      - subcategories
      - total_resources
